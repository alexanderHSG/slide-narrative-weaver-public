<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--  -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <!-- <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🌟</text></svg>"> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InspiraGraph</title>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/src/entrypoints/main.jsx"></script>
    <!-- Script to ensure slides always display as images -->
    <script>
      // Wait for the application to load
      window.addEventListener('load', function() {
        // Give the app a moment to initialize
        setTimeout(function() {
          // Run the slide fix script
          fetch('/fix_slide_images.js')
            .then(response => response.text())
            .then(scriptText => {
              // Wrap the script in a self-executing function and execute
              const wrappedScript = `
                (function() {
                  const networkDiv = document.querySelector('.vis-network');
                  if (!networkDiv) {
                    console.error('Network not found yet. Will retry later.');
                    return;
                  }
                  ${scriptText}
                })();
              `;
              // Create a scheduled task to periodically check and enforce slide images
              const checkAndEnforce = function() {
                const networkDiv = document.querySelector('.vis-network');
                if (networkDiv && networkDiv.__vis_network__) {
                  eval(wrappedScript);
                }
              };
              
              // Run immediately
              checkAndEnforce();
              
              // Also set up interval to run periodically
              setInterval(checkAndEnforce, 5000);
            })
            .catch(error => console.error('Error loading fix script:', error));
        }, 2000); // Wait 2 seconds after load
      });
    </script>
  </body>
</html>
